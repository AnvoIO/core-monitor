services:
  test-postgres:
    image: postgres:17-alpine
    container_name: anvoio-core-monitor-test-db
    environment:
      POSTGRES_DB: core_monitor_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 2s
      retries: 10
