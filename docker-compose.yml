services:
  postgres:
    image: postgres:17-alpine
    container_name: anvoio-core-monitor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    shm_size: '1gb'
    volumes:
      - /SAS/core-monitor-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor}"]
      interval: 5s
      timeout: 5s
      retries: 5

  writer:
    build: .
    container_name: anvoio-core-monitor-writer
    restart: unless-stopped
    env_file: .env
    command: ["node", "dist/writer.js"]
    depends_on:
      postgres:
        condition: service_healthy

  reader:
    build: .
    container_name: anvoio-core-monitor-reader
    restart: unless-stopped
    env_file: .env
    command: ["node", "dist/reader.js"]
    ports:
      - "${MONITOR_PORT:-3100}:3000"
    depends_on:
      postgres:
        condition: service_healthy
