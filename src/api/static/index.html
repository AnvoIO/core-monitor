<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnvoIO Core Monitor</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242734;
      --border: #2e3144;
      --text: #e1e4ed;
      --text-dim: #8b8fa3;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
      --orange: #f97316;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    header h1 span { color: var(--blue); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .controls-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .chain-tabs { display: flex; gap: 4px; }
    .chain-tab { padding: 6px 14px; font-size: 13px; font-weight: 500; color: var(--text-dim); background: none; border: 1px solid transparent; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .chain-tab:hover { color: var(--text); background: var(--surface2); }
    .chain-tab.active { color: var(--text); background: var(--bg); border-color: var(--border); }
    .controls-right { display: flex; align-items: center; gap: 10px; }

    select, button.ctrl-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
      padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; appearance: auto;
    }
    select:hover, button.ctrl-btn:hover { color: var(--text); border-color: var(--text-dim); }

    main { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .stat-card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 4px; }
    .stat-card .value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .stat-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 24px; overflow: hidden; }
    .section-header { padding: 14px 16px; font-size: 14px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .section-header .count { font-size: 12px; color: var(--text-dim); font-weight: 400; }
    .section-separator { padding: 8px 16px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-top: 2px solid var(--border); background: var(--surface2); }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 8px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; line-height: 1.4; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-green { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .badge-yellow { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
    .badge-red { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .badge-orange { background: rgba(249, 115, 22, 0.15); color: var(--orange); }

    .bar-container { width: 80px; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 6px; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .reliability-cell { display: flex; align-items: center; gap: 6px; }
    .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 12px; }
    .empty-state { padding: 40px; text-align: center; color: var(--text-dim); font-size: 14px; }
    .event-row .severity { width: 4px; padding: 0; }
    .event-row .severity-bar { width: 3px; height: 100%; min-height: 16px; }
    .event-time { color: var(--text-dim); }

    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      main { padding: 16px; }
      table { font-size: 12px; }
      th, td { padding: 8px 10px; }
      .controls-bar { flex-wrap: wrap; gap: 8px; }
    }

    footer { text-align: center; padding: 24px; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border); }
    footer a { color: var(--blue); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .clickable { cursor: pointer; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }
    .clickable:hover { color: var(--blue); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .modal-close { float: right; background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 0 4px; }
    .modal-close:hover { color: var(--text); }
    .modal .detail-row { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .modal .detail-row:last-child { border-bottom: none; }
    .modal .detail-label { color: var(--text-dim); min-width: 90px; flex-shrink: 0; }
    .modal .detail-value { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 12px; word-break: break-all; }
    .modal .detail-list { list-style: none; padding: 0; margin: 4px 0 0 0; }
    .modal .detail-list li { padding: 2px 0; }
    .modal .detail-list li::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .modal .detail-list.added li::before { background: var(--green); }
    .modal .detail-list.removed li::before { background: var(--red); }
    .modal .detail-list.keyupdate li::before { background: var(--orange); }
  </style>
</head>
<body>
  <header>
    <h1><span>AnvoIO</span> Core Monitor</h1>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <div class="controls-bar">
    <div class="chain-tabs" id="chainTabs"></div>
    <div class="controls-right">
      <select id="timeframe" onchange="refreshData()">
        <option value="1h">Last 1 Hour</option>
        <option value="1d">Last 24 Hours</option>
        <option value="1w" selected>Last 7 Days</option>
        <option value="1m">Last 30 Days</option>
        <option value="1y">Last Year</option>
        <option value="all">All Time</option>
      </select>
      <select id="sortOrder" onchange="rerender()">
        <option value="performance">Sort: Performance</option>
        <option value="schedule">Sort: Schedule Order</option>
        <option value="alpha">Sort: Alphabetical</option>
      </select>
      <select id="timeMode" onchange="rerender()">
        <option value="local">Local Time</option>
        <option value="utc">UTC</option>
      </select>
      <button class="ctrl-btn" onclick="refreshData()">Refresh</button>
    </div>
  </div>

  <main>
    <div class="grid" id="statsGrid"></div>

    <div class="section">
      <div class="section-header">
        <span>Producers</span>
        <span class="count" id="producerCount"></span>
      </div>
      <div id="producerTable"></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div class="section">
        <div class="section-header">
          <span>Recent Rounds</span>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="count" id="roundCount"></span>
            <select id="roundPageSize" onchange="roundPage=0;refreshData()" style="font-size:11px">
              <option value="25" selected>25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>
        <div id="roundsTable"></div>
        <div id="roundPagination" style="display:flex;justify-content:center;gap:8px;padding:12px"></div>
      </div>
      <div class="section">
        <div class="section-header">
          <span>Events</span>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="count" id="eventCount"></span>
            <select id="eventPageSize" onchange="eventPage=0;refreshData()" style="font-size:11px">
              <option value="25" selected>25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>
        <div id="eventsTable"></div>
        <div id="eventPagination" style="display:flex;justify-content:center;gap:8px;padding:12px"></div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <footer>
    &copy; 2026 <a href="https://anvo.io">AnvoIO</a> &mdash;
    <a href="https://github.com/AnvoIO/core-monitor">AnvoIO/core-monitor</a>
    <span style="margin-left:8px">v{{VERSION}}</span>
  </footer>

  <script>
    let chains = [];
    let activeChain = null;
    let lastData = {};
    let refreshTimer = null;
    let eventPage = 0;
    let roundPage = 0;

    // Persistence
    const savedTimeMode = localStorage.getItem('timeMode');
    if (savedTimeMode) document.getElementById('timeMode').value = savedTimeMode;
    const savedSort = localStorage.getItem('sortOrder');
    if (savedSort) document.getElementById('sortOrder').value = savedSort;

    async function fetchJSON(url) { return (await fetch(url)).json(); }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function showScheduleDetail(data) {
      const added = data.added || [];
      const removed = data.removed || [];
      const keyUpdates = data.keyUpdates || [];
      const producers = data.producers || [];

      let html = `<h3>Schedule v${esc(String(data.version))}</h3>`;
      html += `<div class="detail-row"><span class="detail-label">Producers</span><span class="detail-value">${producers.length}</span></div>`;
      if (data.block) html += `<div class="detail-row"><span class="detail-label">Block</span><span class="detail-value">${data.block.toLocaleString()}</span></div>`;
      if (data.time) html += `<div class="detail-row"><span class="detail-label">Time</span><span class="detail-value">${formatDate(data.time)}</span></div>`;

      if (added.length === 0 && removed.length === 0 && keyUpdates.length === 0) {
        html += `<div class="detail-row"><span class="detail-label">Changes</span><span class="detail-value">No detail available</span></div>`;
      }

      if (added.length > 0) {
        html += `<div class="detail-row"><span class="detail-label">Added</span><span class="detail-value"><ul class="detail-list added">${added.map(p => '<li>' + esc(p) + '</li>').join('')}</ul></span></div>`;
      }
      if (removed.length > 0) {
        html += `<div class="detail-row"><span class="detail-label">Removed</span><span class="detail-value"><ul class="detail-list removed">${removed.map(p => '<li>' + esc(p) + '</li>').join('')}</ul></span></div>`;
      }
      if (keyUpdates.length > 0) {
        html += `<div class="detail-row"><span class="detail-label">Key Update</span><span class="detail-value"><ul class="detail-list keyupdate">${keyUpdates.map(p => '<li>' + esc(p) + '</li>').join('')}</ul></span></div>`;
      }

      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modalOverlay').classList.add('active');
    }

    async function showOutageDetail(producer) {
      if (!activeChain) return;
      const { chain, network } = activeChain;
      const days = Math.ceil(getTimeframeDays());
      const since = getTimeframeSince();
      let url = `/api/v1/${chain}/${network}/producers/${encodeURIComponent(producer)}/outages`;
      url += since ? `?since=${since}` : `?days=${days}`;
      try {
        const resp = await fetch(url);
        const data = await resp.json();
        const chainCfg = activeChain || {};
        const roundMs = (chainCfg.scheduleSize || 21) * (chainCfg.blocksPerBp || 12) * (chainCfg.blockTimeMs || 500);
        function fmtDuration(rounds) {
          const ms = rounds * roundMs;
          const mins = Math.floor(ms / 60000);
          const hrs = Math.floor(mins / 60);
          if (hrs > 0) return `${hrs}h ${mins % 60}m`;
          return `${mins}m`;
        }
        let html = `<h3>Outage History: ${esc(producer)}</h3>`;
        html += `<div class="detail-row"><span class="detail-label">Total Outages</span><span class="detail-value">${data.total_outages}</span></div>`;
        if (data.total_outages > 0) {
          html += `<div class="detail-row"><span class="detail-label">Longest</span><span class="detail-value">${data.longest_streak} rounds (~${fmtDuration(data.longest_streak)})</span></div>`;
          html += `<div class="detail-row"><span class="detail-label">Longest At</span><span class="detail-value">${formatTime(data.longest_streak_start)}</span></div>`;
          html += `<div class="detail-row"><span class="detail-label">Average</span><span class="detail-value">${data.average_streak} rounds (~${fmtDuration(data.average_streak)})</span></div>`;
          html += `<div style="margin-top:12px;font-size:13px;font-weight:600;color:var(--text-dim)">All Outages (longest first)</div>`;
          html += `<table style="width:100%;margin-top:6px;font-size:12px;border-collapse:collapse">`;
          html += `<thead><tr style="color:var(--text-dim);border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px">Rounds</th><th style="text-align:left;padding:4px">Duration</th><th style="text-align:left;padding:4px">Start</th><th style="text-align:left;padding:4px">End</th></tr></thead><tbody>`;
          for (const o of data.outages) {
            html += `<tr style="border-bottom:1px solid var(--border)"><td class="mono" style="padding:4px;color:var(--red)">${o.rounds}</td><td class="mono" style="padding:4px">${fmtDuration(o.rounds)}</td><td class="mono" style="padding:4px">${formatTime(o.start)}</td><td class="mono" style="padding:4px">${formatTime(o.end)}</td></tr>`;
          }
          html += `</tbody></table>`;
        } else {
          html += `<div class="detail-row"><span class="detail-value" style="color:var(--green)">No outages in this period</span></div>`;
        }
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').classList.add('active');
      } catch (err) {
        console.error('Failed to load outage details', err);
      }
    }

    // Store schedule change data for click handlers
    const scheduleDetailCache = {};

    function getTimeframeDays() {
      const tf = document.getElementById('timeframe').value;
      const map = { '1h': 0.042, '1d': 1, '1w': 7, '1m': 30, '1y': 365, 'all': 9999 };
      return map[tf] || 7;
    }

    function getTimeframeSince() {
      const days = getTimeframeDays();
      if (days >= 9999) return null;
      return new Date(Date.now() - days * 86400000).toISOString();
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function formatTime(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      const utc = document.getElementById('timeMode').value === 'utc';
      const y = utc ? d.getUTCFullYear() : d.getFullYear();
      const m = utc ? d.getUTCMonth()+1 : d.getMonth()+1;
      const day = utc ? d.getUTCDate() : d.getDate();
      const h = utc ? d.getUTCHours() : d.getHours();
      const min = utc ? d.getUTCMinutes() : d.getMinutes();
      const s = utc ? d.getUTCSeconds() : d.getSeconds();
      return `${y}-${pad(m)}-${pad(day)} ${pad(h)}:${pad(min)}:${pad(s)}${utc ? ' UTC' : ''}`;
    }

    function formatTimeShort(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      const utc = document.getElementById('timeMode').value === 'utc';
      const h = utc ? d.getUTCHours() : d.getHours();
      const min = utc ? d.getUTCMinutes() : d.getMinutes();
      const s = utc ? d.getUTCSeconds() : d.getSeconds();
      return `${pad(h)}:${pad(min)}:${pad(s)}${utc ? ' UTC' : ''}`;
    }

    function formatDate(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      const utc = document.getElementById('timeMode').value === 'utc';
      const y = utc ? d.getUTCFullYear() : d.getFullYear();
      const m = utc ? d.getUTCMonth()+1 : d.getMonth()+1;
      const day = utc ? d.getUTCDate() : d.getDate();
      return `${y}-${pad(m)}-${pad(day)}`;
    }

    document.getElementById('timeMode').addEventListener('change', () => {
      localStorage.setItem('timeMode', document.getElementById('timeMode').value);
    });
    document.getElementById('sortOrder').addEventListener('change', () => {
      localStorage.setItem('sortOrder', document.getElementById('sortOrder').value);
    });

    async function init() {
      try {
        const data = await fetchJSON('/api/v1/chains');
        chains = data.chains;
        if (chains.length === 0) { document.getElementById('statusText').textContent = 'No chains configured'; return; }
        renderTabs();
        activeChain = chains[0];
        await refreshData();
        document.getElementById('statusDot').style.background = 'var(--green)';
        document.getElementById('statusText').textContent = 'Connected';
        refreshTimer = setInterval(refreshData, 30000);
      } catch (err) {
        document.getElementById('statusDot').style.background = 'var(--red)';
        document.getElementById('statusText').textContent = 'Error: ' + err.message;
      }
    }

    function renderTabs() {
      document.getElementById('chainTabs').innerHTML = chains.map((c, i) =>
        `<button class="chain-tab ${i === 0 ? 'active' : ''}" onclick="switchChain(${i})">${esc(c.chain)} ${esc(c.network)}</button>`
      ).join('');
    }

    async function switchChain(index) {
      activeChain = chains[index];
      eventPage = 0;
      roundPage = 0;
      document.querySelectorAll('.chain-tab').forEach((t, i) => t.classList.toggle('active', i === index));
      await refreshData();
    }

    async function refreshData() {
      if (!activeChain) return;
      const { chain, network } = activeChain;
      const days = Math.ceil(getTimeframeDays());
      const since = getTimeframeSince();

      const eventLimit = parseInt(document.getElementById('eventPageSize').value);
      const eventOffset = eventPage * eventLimit;
      const roundLimit = parseInt(document.getElementById('roundPageSize').value);
      const roundOffset = roundPage * roundLimit;

      const [producers, rounds, events, status] = await Promise.all([
        fetchJSON(`/api/v1/${chain}/${network}/producers${since ? '?since=' + since : '?days=' + days}`),
        fetchJSON(`/api/v1/${chain}/${network}/rounds?limit=${roundLimit}&offset=${roundOffset}${since ? '&since=' + since : ''}`),
        fetchJSON(`/api/v1/${chain}/${network}/events?limit=${eventLimit}&offset=${eventOffset}${since ? '&since=' + since : ''}`),
        fetchJSON(`/api/v1/${chain}/${network}/status`).catch(() => null),
      ]);

      lastData = { producers, rounds, events, status };
      rerender();
    }

    function rerender() {
      const { producers, rounds, events, status } = lastData;
      if (!producers) return;
      renderStats(producers, rounds, status);
      renderProducers(producers);
      renderRounds(rounds);
      renderEvents(events);
    }

    function renderStats(producers, rounds, status) {
      const prods = producers.producers || [];
      const rds = rounds.rounds || [];
      const scheduleVersion = status?.scheduleVersion ?? 0;
      const currentRound = status?.currentRound ?? 0;
      const firstRound = status?.firstCompleteRound;
      const activation = status?.scheduleActivation;
      const earliest = status?.earliestData;
      const pending = status?.pendingSchedule;

      const avgReliability = prods.length > 0
        ? (prods.reduce((s, p) => s + parseFloat(p.reliability_pct || 0), 0) / prods.length).toFixed(2)
        : '—';

      const counts = rounds.counts || { total: rds.length, perfect: 0, issues: 0 };
      const perfectRounds = counts.perfect;
      const issueRounds = counts.issues;
      const totalRounds = counts.total;
      const tf = document.getElementById('timeframe').selectedOptions[0].text.toLowerCase();

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="label">Schedule</div>
          <div class="value mono">${esc(String(scheduleVersion))}${pending ? ' <span style="font-size:12px;color:var(--orange)">→ ' + esc(String(pending.version)) + ' proposed</span>' : ''}</div>
          <div class="sub">${activation ? formatDate(activation.timestamp) + ' / block ' + (activation.blockNumber || 0).toLocaleString() : 'unknown activation'}${pending ? '<br>' + (() => {
            const a = pending.added?.length || 0;
            const r = pending.removed?.length || 0;
            const k = pending.keyUpdates?.length || 0;
            let summary = '';
            if (a) summary += '+' + a + ' ';
            if (r) summary += '-' + r + ' ';
            if (k) summary += k + ' key update' + (k > 1 ? 's' : '') + ' ';
            if (!summary) summary = 'no producer changes ';
            scheduleDetailCache['pending'] = { version: pending.version, producers: pending.producers, added: pending.added, removed: pending.removed, keyUpdates: pending.keyUpdates };
            return '<span class="clickable" onclick="showScheduleDetail(scheduleDetailCache[\'pending\'])">' + summary.trim() + '</span>';
          })() : ''}</div>
        </div>
        <div class="stat-card">
          <div class="label">Current Round</div>
          <div class="value mono">${currentRound.toLocaleString()}</div>
          <div class="sub">${earliest ? 'data from round ' + (earliest.roundNumber || 0).toLocaleString() + ' / ' + formatDate(earliest.timestamp) : 'no historical data'}</div>
        </div>
        <div class="stat-card">
          <div class="label">Avg Reliability</div>
          <div class="value" style="color: ${parseFloat(avgReliability) >= 99 ? 'var(--green)' : parseFloat(avgReliability) >= 95 ? 'var(--yellow)' : 'var(--red)'}">${avgReliability}%</div>
          <div class="sub">${tf}</div>
        </div>
        <div class="stat-card">
          <div class="label">Perfect Rounds</div>
          <div class="value" style="color: var(--green)">${perfectRounds}</div>
          <div class="sub">of ${totalRounds.toLocaleString()} in ${tf}</div>
        </div>
        <div class="stat-card">
          <div class="label">Rounds with Issues</div>
          <div class="value" style="color: ${issueRounds > 0 ? 'var(--yellow)' : 'var(--green)'}">${issueRounds}</div>
          <div class="sub">of ${totalRounds.toLocaleString()} in ${tf}</div>
        </div>
      `;
    }

    function renderProducers(data) {
      const scheduleOrder = data.scheduleOrder || [];
      const scheduledSet = new Set(scheduleOrder);
      const allProds = [...(data.producers || [])];
      const registered = data.registeredProducers || [];
      const sortMode = document.getElementById('sortOrder').value;

      // Section 1: Scheduled (in active schedule)
      let scheduled = allProds.filter(p => scheduledSet.has(p.producer));
      // Section 2: Standby (registered, active, valid key, not scheduled)
      let standby = registered.filter(p => p.is_active && p.producer_key && !p.producer_key.startsWith('EOS111111111'));
      // Section 3: Unregistered (inactive or null key, not scheduled)
      let unregistered = registered.filter(p => !p.is_active || !p.producer_key || p.producer_key.startsWith('EOS111111111'));

      // Also add scheduled producers with stats but check for warning (unregistered but scheduled)
      const scheduledWithWarning = scheduled.map(p => ({
        ...p,
        warning: !p.is_active ? 'Unregistered but still scheduled' : null,
      }));

      // Sort scheduled
      if (sortMode === 'schedule') {
        scheduledWithWarning.sort((a, b) => scheduleOrder.indexOf(a.producer) - scheduleOrder.indexOf(b.producer));
      } else if (sortMode === 'alpha') {
        scheduledWithWarning.sort((a, b) => a.producer.localeCompare(b.producer));
      }
      // performance is default from API (reliability DESC, alpha ASC)

      // Sort standby
      if (sortMode === 'performance' && standby.some(s => s.reliability_pct != null)) {
        standby.sort((a, b) => (b.reliability_pct || 0) - (a.reliability_pct || 0) || a.producer.localeCompare(b.producer));
      } else {
        standby.sort((a, b) => a.producer.localeCompare(b.producer));
      }

      // Unregistered always alphabetical
      unregistered.sort((a, b) => a.producer.localeCompare(b.producer));

      const totalScheduled = scheduledWithWarning.length;
      const totalStandby = standby.length;
      const totalUnregistered = unregistered.length;
      document.getElementById('producerCount').textContent = `${totalScheduled} scheduled, ${totalStandby} standby, ${totalUnregistered} unregistered`;

      function truncateKey(key) {
        if (!key || key.length < 20) return key || '';
        return key.substring(0, 10) + '...' + key.substring(key.length - 4);
      }

      function formatOutage(rounds) {
        if (!rounds) return '—';
        const chain = activeChain || {};
        const roundMs = (chain.scheduleSize || 21) * (chain.blocksPerBp || 12) * (chain.blockTimeMs || 500);
        const totalMs = rounds * roundMs;
        const mins = Math.floor(totalMs / 60000);
        const hrs = Math.floor(mins / 60);
        if (hrs > 0) return `${rounds} (~${hrs}h ${mins % 60}m)`;
        return `${rounds} (~${mins}m)`;
      }

      function producerRow(p, index, dimmed) {
        const hasData = (p.total_rounds || 0) > 0;
        const rel = parseFloat(p.reliability_pct) || 0;
        const barColor = rel >= 99 ? 'var(--green)' : rel >= 95 ? 'var(--yellow)' : 'var(--red)';
        const relBadge = rel >= 99 ? 'badge-green' : rel >= 95 ? 'badge-yellow' : 'badge-red';
        const statusBadge = p.producing === 'up' ? '<span class="badge badge-green">Up</span>'
          : p.producing === 'degraded' ? '<span class="badge badge-yellow">Degraded</span>'
          : p.producing === 'down' ? '<span class="badge badge-red">Down</span>'
          : '<span class="badge" style="background:rgba(139,143,163,0.15);color:var(--text-dim)">Unknown</span>';
        const warningIcon = p.warning ? ' <span title="' + esc(p.warning) + '" style="color:var(--orange);cursor:help;font-size:14px;">&#9888;</span>' : '';
        const outage = p.longest_outage || 0;
        const outageColor = outage > 5 ? 'var(--red)' : outage > 0 ? 'var(--yellow)' : 'var(--text-dim)';
        const style = dimmed ? ' style="opacity:0.6"' : '';

        return `<tr${style}>
          <td style="color:var(--text-dim);width:30px">${index}</td>
          <td><strong>${esc(p.producer)}</strong>${warningIcon}</td>
          <td>${statusBadge}</td>
          <td class="mono" style="font-size:11px;color:var(--text-dim)" title="${esc(p.producer_key||'')}">${esc(truncateKey(p.producer_key))}</td>
          <td class="mono">${hasData ? p.total_rounds : '—'}</td>
          <td class="mono">${hasData ? p.rounds_produced : '—'}</td>
          <td class="mono" style="color:${(p.rounds_missed||0)>0?'var(--red)':'var(--text-dim)'}">${hasData ? p.rounds_missed : '—'}</td>
          <td class="mono">${hasData ? `${p.total_blocks_produced}/${p.total_blocks_expected}` : '—'}</td>
          <td class="mono clickable" style="color:${outageColor};cursor:pointer" onclick="showOutageDetail('${esc(p.producer)}')">${outage > 0 ? formatOutage(outage) : '—'}</td>
          <td>${hasData ? `<div class="reliability-cell"><div class="bar-container"><div class="bar-fill" style="width:${Math.min(rel,100)}%;background:${barColor}"></div></div><span class="badge ${relBadge}">${rel.toFixed(2)}%</span></div>` : '<span style="color:var(--text-dim)">—</span>'}</td>
        </tr>`;
      }

      const header = `<thead><tr>
        <th>#</th><th>Producer</th><th>Status</th><th>Signing Key</th>
        <th>Scheduled</th><th>Produced</th><th>Missed</th><th>Blocks</th>
        <th>Longest Outage</th><th>Reliability</th>
      </tr></thead>`;

      let body = '';

      // Section 1: Scheduled
      if (scheduledWithWarning.length > 0) {
        body += `<tr><td colspan="10" class="section-separator">Scheduled (${scheduledWithWarning.length})</td></tr>`;
        body += scheduledWithWarning.map((p, i) => producerRow(p, i + 1, false)).join('');
      }

      // Section 2: Standby
      if (standby.length > 0) {
        body += `<tr><td colspan="10" class="section-separator">Standby (${standby.length})</td></tr>`;
        body += standby.map(p => producerRow(p, '—', true)).join('');
      }

      // Section 3: Unregistered
      if (unregistered.length > 0) {
        body += `<tr><td colspan="10" class="section-separator">Unregistered (${unregistered.length})</td></tr>`;
        body += unregistered.map(p => producerRow(p, '—', true)).join('');
      }

      if (!body) {
        document.getElementById('producerTable').innerHTML = '<div class="empty-state">Waiting for data...</div>';
        return;
      }

      document.getElementById('producerTable').innerHTML = `<table>${header}<tbody>${body}</tbody></table>`;
    }

    function renderRounds(data) {
      const rounds = data.rounds || [];
      const roundLimit = parseInt(document.getElementById('roundPageSize').value);
      const hasMore = rounds.length >= roundLimit;
      document.getElementById('roundCount').textContent = `page ${roundPage + 1}`;

      if (rounds.length === 0) {
        document.getElementById('roundsTable').innerHTML = '<div class="empty-state">Waiting for rounds...</div>';
        document.getElementById('roundPagination').innerHTML = '';
        return;
      }

      const rows = rounds.map(r => {
        const status = r.producers_missed === 0 ? 'badge-green' : 'badge-yellow';
        const label = r.producers_missed === 0 ? 'Perfect' : `${r.producers_missed} missed`;
        return `<tr>
          <td class="mono">${r.schedule_version} / ${r.round_number.toLocaleString()}</td>
          <td class="mono">${r.producers_produced}/${r.producers_scheduled}</td>
          <td><span class="badge ${status}">${label}</span></td>
          <td class="event-time">${formatTimeShort(r.timestamp_end)}</td>
        </tr>`;
      }).join('');

      document.getElementById('roundsTable').innerHTML = `<table>
        <thead><tr><th>Round</th><th>Produced</th><th>Status</th><th>Time</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

      const prevDisabled = roundPage === 0 ? ' disabled style="opacity:0.3;cursor:default"' : '';
      const nextDisabled = !hasMore ? ' disabled style="opacity:0.3;cursor:default"' : '';
      document.getElementById('roundPagination').innerHTML =
        `<button class="ctrl-btn"${prevDisabled} onclick="if(roundPage>0){roundPage--;refreshData()}">Previous</button>` +
        `<button class="ctrl-btn"${nextDisabled} onclick="if(${hasMore}){roundPage++;refreshData()}">Next</button>`;
    }

    function renderEvents(data) {
      const missed = data.missed_blocks || [];
      const forks = data.forks || [];
      const schedules = data.schedule_changes || [];
      const producerEvents = data.producer_events || [];
      const eventLimit = parseInt(document.getElementById('eventPageSize').value);

      const all = [
        ...missed.map(e => ({ severity: 'red', text: `${esc(e.producer)} missed ${e.blocks_missed} blocks`, time: e.timestamp })),
        ...forks.map(e => ({ severity: 'yellow', text: `Fork: ${esc(e.original_producer)} replaced by ${esc(e.replacement_producer)} at block ${e.block_number}`, time: e.timestamp })),
        ...schedules.map(e => { try {
          const count = JSON.parse(e.producer_list).length;
          const added = e.producers_added ? JSON.parse(e.producers_added) : [];
          const removed = e.producers_removed ? JSON.parse(e.producers_removed) : [];
          const keyUpd = e.producers_key_updates ? JSON.parse(e.producers_key_updates) : [];
          const cacheKey = 'sched_' + e.schedule_version;
          scheduleDetailCache[cacheKey] = { version: e.schedule_version, producers: JSON.parse(e.producer_list), added, removed, keyUpdates: keyUpd, block: e.block_number, time: e.timestamp };
          const a = added.length, r = removed.length, k = keyUpd.length;
          let tag = '';
          if (a) tag += ' +' + a;
          if (r) tag += ' -' + r;
          if (k) tag += ' ' + k + ' key update' + (k > 1 ? 's' : '');
          return { severity: 'blue', text: `<span class="clickable" onclick="showScheduleDetail(scheduleDetailCache['${cacheKey}'])">Schedule ${esc(String(e.schedule_version))} (${count} producers)${tag ? ' —' + tag : ''}</span>`, time: e.timestamp };
        } catch { return { severity: 'blue', text: `Schedule ${esc(String(e.schedule_version))}`, time: e.timestamp }; } }),
        ...producerEvents.map(e => {
          const label = e.action === 'regproducer' ? 'registered' : e.action === 'kickbp' ? 'kicked' : 'unregistered';
          const sev = e.action === 'regproducer' ? 'green' : e.action === 'kickbp' ? 'orange' : 'purple';
          return { severity: sev, text: `${esc(e.producer)} ${label} at block ${e.block_number}`, time: e.timestamp };
        }),
      ].sort((a, b) => new Date(b.time).getTime() - new Date(a.time).getTime());

      const hasMore = all.length >= eventLimit;
      document.getElementById('eventCount').textContent = `page ${eventPage + 1}`;

      if (all.length === 0) {
        document.getElementById('eventsTable').innerHTML = '<div class="empty-state">No events yet</div>';
        return;
      }

      const colorMap = { red: 'var(--red)', yellow: 'var(--yellow)', blue: 'var(--blue)', green: 'var(--green)', purple: 'var(--purple)', orange: 'var(--orange)' };
      const rows = all.map(e => `
        <tr class="event-row">
          <td class="severity"><div class="severity-bar" style="background:${colorMap[e.severity]}"></div></td>
          <td>${e.text}</td>
          <td class="event-time">${formatTime(e.time)}</td>
        </tr>
      `).join('');

      document.getElementById('eventsTable').innerHTML = `<table>
        <thead><tr><th style="width:4px"></th><th>Event</th><th>Time</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

      // Pagination controls
      const prevDisabled = eventPage === 0 ? ' disabled style="opacity:0.3;cursor:default"' : '';
      const nextDisabled = !hasMore ? ' disabled style="opacity:0.3;cursor:default"' : '';
      document.getElementById('eventPagination').innerHTML =
        `<button class="ctrl-btn"${prevDisabled} onclick="if(eventPage>0){eventPage--;refreshData()}">Previous</button>` +
        `<button class="ctrl-btn"${nextDisabled} onclick="if(${hasMore}){eventPage++;refreshData()}">Next</button>`;
    }

    init();
  </script>
</body>
</html>
