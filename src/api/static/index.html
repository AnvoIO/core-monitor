<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnvoIO Core Monitor</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242734;
      --border: #2e3144;
      --text: #e1e4ed;
      --text-dim: #8b8fa3;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--blue); }

    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .chain-tabs {
      display: flex;
      gap: 4px;
      padding: 12px 24px 0;
      background: var(--surface);
    }

    .chain-tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      background: none;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chain-tab:hover { color: var(--text); background: var(--surface2); }
    .chain-tab.active {
      color: var(--text);
      background: var(--bg);
      border-color: var(--border);
    }

    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .stat-card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .stat-card .sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .section-header {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-header .count {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 400;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-green { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .badge-yellow { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
    .badge-red { background: rgba(239, 68, 68, 0.15); color: var(--red); }

    .bar-container {
      width: 100px;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .reliability-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 12px; }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    .refresh-btn:hover { color: var(--text); border-color: var(--text-dim); }

    .sort-toggle {
      min-width: 130px;
      text-align: center;
    }

    .event-row .severity {
      width: 4px;
      padding: 0;
    }

    .event-row .severity-bar {
      width: 3px;
      height: 100%;
      min-height: 20px;
    }

    .event-time { color: var(--text-dim); }

    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      main { padding: 16px; }
      table { font-size: 12px; }
      th, td { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>AnvoIO</span> Core Monitor</h1>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <div class="chain-tabs" id="chainTabs"></div>

  <main>
    <div class="grid" id="statsGrid"></div>

    <div class="section">
      <div class="section-header">
        <span>Producer Reliability</span>
        <div style="display: flex; align-items: center; gap: 12px;">
          <span class="count" id="producerCount"></span>
          <button class="refresh-btn sort-toggle" id="sortToggle" onclick="toggleSort()">Sort: Performance</button>
        </div>
      </div>
      <div id="producerTable"></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div class="section">
        <div class="section-header">
          <span>Recent Rounds</span>
          <button class="refresh-btn" onclick="refreshData()">Refresh</button>
        </div>
        <div id="roundsTable"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <span>Events</span>
          <span class="count" id="eventCount"></span>
        </div>
        <div id="eventsTable"></div>
      </div>
    </div>
  </main>

  <footer style="text-align: center; padding: 24px; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border);">
    &copy; 2026 <a href="https://anvo.io" style="color: var(--blue); text-decoration: none;">AnvoIO</a> &mdash;
    <a href="https://github.com/AvoIO/core-monitor" style="color: var(--text-dim); text-decoration: none;">GitHub</a>
  </footer>

  <script>
    const API = '';
    let chains = [];
    let activeChain = null;
    let refreshTimer = null;
    let sortBySchedule = false;
    let lastProducerData = null;

    async function fetchJSON(url) {
      const res = await fetch(API + url);
      return res.json();
    }

    async function init() {
      try {
        const data = await fetchJSON('/api/v1/chains');
        chains = data.chains;
        if (chains.length === 0) {
          document.getElementById('statusText').textContent = 'No chains configured';
          return;
        }
        renderTabs();
        activeChain = chains[0];
        await refreshData();
        document.getElementById('statusDot').style.background = 'var(--green)';
        document.getElementById('statusText').textContent = 'Connected';

        // Auto-refresh every 30 seconds
        refreshTimer = setInterval(refreshData, 30000);
      } catch (err) {
        document.getElementById('statusDot').style.background = 'var(--red)';
        document.getElementById('statusText').textContent = 'Error: ' + err.message;
      }
    }

    function renderTabs() {
      const tabs = document.getElementById('chainTabs');
      tabs.innerHTML = chains.map((c, i) =>
        `<button class="chain-tab ${i === 0 ? 'active' : ''}" onclick="switchChain(${i})">${c.chain} ${c.network}</button>`
      ).join('');
    }

    async function switchChain(index) {
      activeChain = chains[index];
      document.querySelectorAll('.chain-tab').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
      await refreshData();
    }

    async function refreshData() {
      if (!activeChain) return;
      const { chain, network } = activeChain;

      const [producers, rounds, events, status] = await Promise.all([
        fetchJSON(`/api/v1/${chain}/${network}/producers?days=7`),
        fetchJSON(`/api/v1/${chain}/${network}/rounds?limit=20`),
        fetchJSON(`/api/v1/${chain}/${network}/events?limit=20`),
        fetchJSON(`/api/v1/${chain}/${network}/status`).catch(() => null),
      ]);

      renderStats(producers, rounds, status);
      renderProducers(producers);
      renderRounds(rounds);
      renderEvents(events);
    }

    function renderStats(producers, rounds, status) {
      const prods = producers.producers || [];
      const rds = rounds.rounds || [];

      const totalProducers = prods.length;
      const avgReliability = prods.length > 0
        ? (prods.reduce((s, p) => s + (p.reliability_pct || 0), 0) / prods.length).toFixed(1)
        : '—';

      const currentRound = status?.currentRound ?? (rds.length > 0 ? rds[0].round_number : 0);
      const firstRound = status?.firstCompleteRound;
      const scheduleVersion = status?.scheduleVersion ?? (rds.length > 0 ? rds[0].schedule_version : 0);
      const recentMisses = rds.filter(r => r.producers_missed > 0).length;
      const perfectRounds = rds.filter(r => r.producers_missed === 0).length;
      const monitoringSince = firstRound != null
        ? `since round ${firstRound.toLocaleString()}`
        : 'waiting for first complete round';

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="label">Schedule</div>
          <div class="value mono">${scheduleVersion}</div>
          <div class="sub">${totalProducers} producers</div>
        </div>
        <div class="stat-card">
          <div class="label">Current Round</div>
          <div class="value mono">${currentRound.toLocaleString()}</div>
          <div class="sub">monitoring ${monitoringSince}</div>
        </div>
        <div class="stat-card">
          <div class="label">Avg Reliability</div>
          <div class="value" style="color: ${parseFloat(avgReliability) >= 99 ? 'var(--green)' : parseFloat(avgReliability) >= 95 ? 'var(--yellow)' : 'var(--red)'}">${avgReliability}%</div>
          <div class="sub">last 7 days</div>
        </div>
        <div class="stat-card">
          <div class="label">Perfect Rounds</div>
          <div class="value" style="color: var(--green)">${perfectRounds}</div>
          <div class="sub">of last ${rds.length} tracked</div>
        </div>
        <div class="stat-card">
          <div class="label">Rounds with Issues</div>
          <div class="value" style="color: ${recentMisses > 0 ? 'var(--yellow)' : 'var(--green)'}">${recentMisses}</div>
          <div class="sub">of last ${rds.length} tracked</div>
        </div>
      `;
    }

    function toggleSort() {
      sortBySchedule = !sortBySchedule;
      document.getElementById('sortToggle').textContent = sortBySchedule ? 'Sort: Schedule' : 'Sort: Performance';
      if (lastProducerData) renderProducers(lastProducerData);
    }

    function renderProducers(data) {
      lastProducerData = data;
      const scheduleOrder = data.scheduleOrder || [];
      let prods = [...(data.producers || [])];

      if (sortBySchedule && scheduleOrder.length > 0) {
        prods.sort((a, b) => {
          const ai = scheduleOrder.indexOf(a.producer);
          const bi = scheduleOrder.indexOf(b.producer);
          return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
        });
      }

      const registered = data.registeredProducers || [];
      const totalScheduled = prods.length;
      const totalRegistered = registered.length;
      document.getElementById('producerCount').textContent = `${totalScheduled} scheduled, ${totalRegistered} registered`;

      if (prods.length === 0 && registered.length === 0) {
        document.getElementById('producerTable').innerHTML = '<div class="empty-state">Waiting for data...</div>';
        return;
      }

      function truncateKey(key) {
        if (!key || key.length < 20) return key || '';
        return key.substring(0, 12) + '...' + key.substring(key.length - 6);
      }

      function formatOutage(rounds) {
        if (!rounds) return '&mdash;';
        // Round duration: scheduleSize * blocksPerBp * blockTimeMs
        const chain = activeChain || {};
        const roundMs = (chain.scheduleSize || 21) * (chain.blocksPerBp || 12) * (chain.blockTimeMs || 500);
        const totalMs = rounds * roundMs;
        const mins = Math.floor(totalMs / 60000);
        const hrs = Math.floor(mins / 60);
        if (hrs > 0) return `${rounds} rounds (~${hrs}h ${mins % 60}m)`;
        return `${rounds} rounds (~${mins}m)`;
      }

      function renderProducerRow(p, index, dimmed) {
        const rel = p.reliability_pct ?? 0;
        const hasData = p.total_rounds > 0;
        const barColor = rel >= 99 ? 'var(--green)' : rel >= 95 ? 'var(--yellow)' : 'var(--red)';
        const badge = rel >= 99 ? 'badge-green' : rel >= 95 ? 'badge-yellow' : 'badge-red';
        const regBadge = p.is_active
          ? '<span class="badge badge-green">active</span>'
          : '<span class="badge badge-red">inactive</span>';
        const outage = p.longest_outage || 0;
        const outageColor = outage > 5 ? 'var(--red)' : outage > 0 ? 'var(--yellow)' : 'var(--text-dim)';
        const style = dimmed ? ' style="opacity: 0.6;"' : '';

        return `<tr${style}>
          <td style="color: var(--text-dim); width: 30px;">${index}</td>
          <td><strong>${p.producer}</strong></td>
          <td>${regBadge}</td>
          <td class="mono" style="font-size:11px; color: var(--text-dim);" title="${p.producer_key || ''}">${truncateKey(p.producer_key)}</td>
          <td class="mono">${hasData ? p.total_rounds : '&mdash;'}</td>
          <td class="mono">${hasData ? p.rounds_produced : '&mdash;'}</td>
          <td class="mono" style="color: ${(p.rounds_missed || 0) > 0 ? 'var(--red)' : 'var(--text-dim)'}">${hasData ? p.rounds_missed : '&mdash;'}</td>
          <td class="mono">${hasData ? `${p.total_blocks_produced} / ${p.total_blocks_expected}` : '&mdash;'}</td>
          <td class="mono" style="color: ${outageColor}">${outage > 0 ? formatOutage(outage) : '&mdash;'}</td>
          <td>${hasData ? `<div class="reliability-cell">
              <div class="bar-container">
                <div class="bar-fill" style="width: ${rel}%; background: ${barColor}"></div>
              </div>
              <span class="badge ${badge}">${rel.toFixed(1)}%</span>
            </div>` : '<span style="color: var(--text-dim);">&mdash;</span>'}</td>
        </tr>`;
      }

      const scheduledRows = prods.map((p, i) => renderProducerRow(p, i + 1, false)).join('');

      const registeredRows = registered.length > 0
        ? `<tr><td colspan="10" style="padding: 8px 16px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-top: 2px solid var(--border);">Registered (not scheduled)</td></tr>` +
          registered.sort((a, b) => a.producer.localeCompare(b.producer))
            .map(p => renderProducerRow(p, '&mdash;', true)).join('')
        : '';

      document.getElementById('producerTable').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Producer</th>
              <th>Status</th>
              <th>Signing Key</th>
              <th>Rounds</th>
              <th>Produced</th>
              <th>Missed</th>
              <th>Blocks</th>
              <th>Longest Outage</th>
              <th>Reliability</th>
            </tr>
          </thead>
          <tbody>${scheduledRows}${registeredRows}</tbody>
        </table>
      `;
    }

    function renderRounds(data) {
      const rounds = data.rounds || [];

      if (rounds.length === 0) {
        document.getElementById('roundsTable').innerHTML = '<div class="empty-state">Waiting for rounds...</div>';
        return;
      }

      const rows = rounds.map(r => {
        const status = r.producers_missed === 0 ? 'badge-green' : 'badge-yellow';
        const label = r.producers_missed === 0 ? 'Perfect' : `${r.producers_missed} missed`;
        const time = r.timestamp_end ? new Date(r.timestamp_end).toLocaleTimeString() : '—';
        const roundRef = `${r.schedule_version} / ${r.round_number}`;

        return `<tr>
          <td class="mono">${roundRef}</td>
          <td class="mono">${r.producers_produced}/${r.producers_scheduled}</td>
          <td><span class="badge ${status}">${label}</span></td>
          <td class="event-time">${time}</td>
        </tr>`;
      }).join('');

      document.getElementById('roundsTable').innerHTML = `
        <table>
          <thead>
            <tr><th>Round</th><th>Produced</th><th>Status</th><th>Time</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderEvents(data) {
      const missed = data.missed_blocks || [];
      const forks = data.forks || [];
      const schedules = data.schedule_changes || [];
      const producerEvents = data.producer_events || [];

      const all = [
        ...missed.map(e => ({ type: 'missed', severity: 'red', text: `${e.producer} missed ${e.blocks_missed} blocks`, time: e.timestamp })),
        ...forks.map(e => ({ type: 'fork', severity: 'yellow', text: `Fork: ${e.original_producer} replaced by ${e.replacement_producer} at block ${e.block_number}`, time: e.timestamp })),
        ...schedules.map(e => ({ type: 'schedule', severity: 'blue', text: `Schedule ${e.schedule_version} (${JSON.parse(e.producer_list).length} producers)`, time: e.timestamp })),
        ...producerEvents.map(e => ({
          type: 'producer',
          severity: e.action === 'regproducer' ? 'green' : 'purple',
          text: `${e.producer} ${e.action === 'regproducer' ? 'registered' : 'unregistered'} at block ${e.block_number}`,
          time: e.timestamp,
        })),
      ].sort((a, b) => new Date(b.time).getTime() - new Date(a.time).getTime()).slice(0, 30);

      document.getElementById('eventCount').textContent = `${all.length} events`;

      if (all.length === 0) {
        document.getElementById('eventsTable').innerHTML = '<div class="empty-state">No events yet</div>';
        return;
      }

      const colorMap = { red: 'var(--red)', yellow: 'var(--yellow)', blue: 'var(--blue)', green: 'var(--green)', purple: 'var(--purple)' };
      const rows = all.map(e => `
        <tr class="event-row">
          <td class="severity"><div class="severity-bar" style="background: ${colorMap[e.severity]}"></div></td>
          <td>${e.text}</td>
          <td class="event-time">${new Date(e.time).toLocaleString()}</td>
        </tr>
      `).join('');

      document.getElementById('eventsTable').innerHTML = `
        <table>
          <thead><tr><th style="width:4px"></th><th>Event</th><th>Time</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    init();
  </script>
</body>
</html>
